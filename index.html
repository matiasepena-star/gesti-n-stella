<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business OS | Premium v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background: #f1f5f9; }
        .tab-active { color: #4f46e5; border-top: 3px solid #4f46e5; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-900">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-slate-200">
        <div>
            <h1 class="text-xl font-black text-indigo-900">BusinessOS</h1>
            <p id="current-view-title" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Dashboard</p>
        </div>
        <div class="flex gap-2">
            <button onclick="exportData()" class="p-2 text-slate-400"><i class="fas fa-cloud-download"></i></button>
            <div class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-bold">MP</div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pt-6 pb-32">
        
        <section id="view-home" class="view space-y-6">
            <div class="bg-indigo-700 p-6 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-200">
                <p class="opacity-70 text-xs font-bold">DISPONIBILIDAD TOTAL</p>
                <h2 id="total-balance" class="text-4xl font-black mt-1">$ 0,00</h2>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <p class="text-[10px] uppercase opacity-60">Ventas Hoy</p>
                        <p id="ingresos-hoy" class="font-bold text-lg">+$0</p>
                    </div>
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <p class="text-[10px] uppercase opacity-60">Gastos Hoy</p>
                        <p id="gastos-hoy" class="font-bold text-lg">-$0</p>
                    </div>
                </div>
            </div>

            <div id="wallet-container" class="grid grid-cols-2 gap-3">
                </div>
        </section>

        <section id="view-add" class="view hidden">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex p-1 bg-slate-100 rounded-2xl mb-6">
                    <button onclick="setMode('Venta')" id="mode-venta" class="flex-1 py-3 rounded-xl font-bold transition">VENTA</button>
                    <button onclick="setMode('Gasto')" id="mode-gasto" class="flex-1 py-3 rounded-xl font-bold transition">GASTO</button>
                </div>

                <div class="space-y-4">
                    <div id="input-concept-container" class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Detalle / Persona</label>
                        <div id="wrapper-detalle">
                            <input id="in-concepto" type="text" placeholder="Ej: Juan Pérez" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none font-bold">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Categoría</label>
                            <select id="in-cat" onchange="actualizarSubcats()" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm outline-none"></select>
                        </div>
                        <div id="subcat-div" class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Ítem (Maestro)</label>
                            <select id="in-subcat" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm outline-none"></select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Billetera</label>
                            <select id="in-wallet" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm outline-none"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Estado</label>
                            <select id="in-estado" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm outline-none">
                                <option value="Pagado">Pagado</option>
                                <option value="Pendiente">Pendiente</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 text-indigo-600">Monto Total</label>
                        <div class="relative">
                            <span class="absolute left-4 top-4 font-bold text-slate-400">$</span>
                            <input id="in-monto" type="number" inputmode="decimal" placeholder="0" class="w-full p-4 pl-8 rounded-2xl bg-slate-50 border-none text-2xl font-black text-indigo-700 outline-none">
                        </div>
                    </div>

                    <button onclick="saveMovimiento()" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black shadow-xl shadow-indigo-100 active:scale-95 transition">REGISTRAR</button>
                </div>
            </div>
        </section>

        <section id="view-hitos" class="view hidden space-y-4">
            <div class="flex flex-wrap gap-2">
                <input type="text" id="h-search" onkeyup="renderHitos()" placeholder="Buscar concepto..." class="flex-1 p-3 rounded-xl bg-white border border-slate-200 outline-none text-sm">
                <select id="h-filter-cat" onchange="renderHitos()" class="p-3 rounded-xl bg-white border border-slate-200 text-xs font-bold outline-none"></select>
            </div>
            <div id="hitos-list" class="space-y-3"></div>
        </section>

        <section id="view-pendientes" class="view hidden space-y-4">
            <div class="bg-amber-100 p-4 rounded-2xl text-amber-800 text-sm font-bold flex justify-between">
                <span>TOTAL DEUDAS</span>
                <span id="deuda-total-suma">$ 0</span>
            </div>
            <div id="pendientes-list" class="space-y-2"></div>
        </section>

        <section id="view-config" class="view hidden space-y-6">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 space-y-4">
                <h3 class="font-black text-slate-800">Gestionar Maestros</h3>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-400">Categoría</label>
                    <div class="flex gap-2">
                        <input id="m-cat-new" type="text" class="flex-1 p-3 rounded-xl bg-slate-50 border-none">
                        <button onclick="addMaestro('categories', 'm-cat-new')" class="bg-indigo-600 text-white px-4 rounded-xl">+</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400">Sub-item (Asociar a la cat elegida arriba)</label>
                    <div class="flex gap-2">
                        <input id="m-sub-new" type="text" class="flex-1 p-3 rounded-xl bg-slate-50 border-none">
                        <button onclick="addSubMaestro()" class="bg-slate-800 text-white px-4 rounded-xl">+</button>
                    </div>
                </div>

                <div class="pt-4 border-t">
                    <label class="text-[10px] font-bold text-slate-400">Billetera / Banco</label>
                    <div class="flex gap-2">
                        <input id="m-wall-new" type="text" class="flex-1 p-3 rounded-xl bg-slate-50 border-none">
                        <button onclick="addMaestro('wallets', 'm-wall-new')" class="bg-indigo-600 text-white px-4 rounded-xl">+</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 px-6 py-3 flex justify-between items-center safe-bottom shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="nav('home')" id="t-home" class="flex flex-col items-center gap-1 text-slate-400 tab-active"><i class="fas fa-home"></i><span class="text-[8px] font-bold uppercase">Saldos</span></button>
        <button onclick="nav('hitos')" id="t-hitos" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-list-ul"></i><span class="text-[8px] font-bold uppercase">Hitos</span></button>
        <button onclick="nav('add')" id="t-add" class="bg-indigo-600 w-12 h-12 rounded-full text-white flex items-center justify-center -mt-10 shadow-lg border-4 border-white"><i class="fas fa-plus"></i></button>
        <button onclick="nav('pendientes')" id="t-pendientes" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-user-clock"></i><span class="text-[8px] font-bold uppercase">Pendientes</span></button>
        <button onclick="nav('config')" id="t-config" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-cog"></i><span class="text-[8px] font-bold uppercase">Maestros</span></button>
    </nav>

    <script>
        // --- BASE DE DATOS ---
        let db = JSON.parse(localStorage.getItem('biz_v4')) || {
            categories: ['Impuestos', 'Sueldos', 'Mercadería', 'Ventas'],
            subcategories: { 'Impuestos': ['Luz', 'Gas', 'Internet'], 'Mercadería': ['Proveedor A', 'Proveedor B'] },
            wallets: ['Efectivo', 'Mercado Pago', 'Brubank'],
            movs: []
        };

        let mode = 'Venta';

        function nav(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(e => e.classList.remove('tab-active'));
            document.getElementById('view-' + v).classList.remove('hidden');
            document.getElementById('t-' + v).classList.add('tab-active');
            document.getElementById('current-view-title').innerText = v;
            if(v === 'home') renderHome();
            if(v === 'hitos') renderHitos();
            if(v === 'pendientes') renderPendientes();
            if(v === 'add') renderSelects();
        }

        function setMode(m) {
            mode = m;
            const v = document.getElementById('mode-venta');
            const g = document.getElementById('mode-gasto');
            const sub = document.getElementById('subcat-div');
            if(m === 'Venta') {
                v.className = "flex-1 py-3 rounded-xl font-bold bg-white shadow-sm text-indigo-600";
                g.className = "flex-1 py-3 rounded-xl font-bold text-slate-400";
                sub.classList.add('hidden');
            } else {
                g.className = "flex-1 py-3 rounded-xl font-bold bg-white shadow-sm text-red-600";
                v.className = "flex-1 py-3 rounded-xl font-bold text-slate-400";
                sub.classList.remove('hidden');
            }
        }

        function renderSelects() {
            document.getElementById('in-cat').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('in-wallet').innerHTML = db.wallets.map(w => `<option value="${w}">${w}</option>`).join('');
            document.getElementById('h-filter-cat').innerHTML = '<option value="All">Todas</option>' + db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            actualizarSubcats();
        }

        function actualizarSubcats() {
            const cat = document.getElementById('in-cat').value;
            const sub = db.subcategories[cat] || [];
            document.getElementById('in-subcat').innerHTML = sub.map(s => `<option value="${s}">${s}</option>`).join('') || '<option value="-">-</option>';
        }

        function saveMovimiento() {
            const concepto = document.getElementById('in-concepto').value.trim();
            const monto = parseFloat(document.getElementById('in-monto').value);
            const cat = document.getElementById('in-cat').value;
            const subcat = mode === 'Gasto' ? document.getElementById('in-subcat').value : '-';
            
            if(!concepto || isNaN(monto)) return alert("Error: Concepto y Monto son obligatorios");

            const mov = {
                id: Date.now(),
                tipo: mode,
                concepto,
                cat,
                subcat,
                wallet: document.getElementById('in-wallet').value,
                monto,
                estado: document.getElementById('in-estado').value,
                fecha: new Date().toISOString()
            };

            db.movs.unshift(mov);
            save();
            document.getElementById('in-concepto').value = '';
            document.getElementById('in-monto').value = '';
            nav('home');
        }

        function formatMoneda(val) {
            return '$ ' + val.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        }

        function renderHome() {
            const pagados = db.movs.filter(m => m.estado === 'Pagado');
            const total = pagados.reduce((acc, m) => m.tipo === 'Venta' ? acc + m.monto : acc - m.monto, 0);
            document.getElementById('total-balance').innerText = formatMoneda(total);

            // Billeteras
            document.getElementById('wallet-container').innerHTML = db.wallets.map(w => {
                const s = pagados.filter(m => m.wallet === w).reduce((acc, m) => m.tipo === 'Venta' ? acc + m.monto : acc - m.monto, 0);
                return `<div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">${w}</p>
                    <p class="text-sm font-bold mt-1 ${s >= 0 ? 'text-indigo-600' : 'text-red-500'}">${formatMoneda(s)}</p>
                </div>`;
            }).join('');
        }

        function renderHitos() {
            const search = document.getElementById('h-search').value.toLowerCase();
            const cat = document.getElementById('h-filter-cat').value;
            
            const filtered = db.movs.filter(m => {
                const matchesSearch = m.concepto.toLowerCase().includes(search) || m.subcat.toLowerCase().includes(search);
                const matchesCat = cat === 'All' || m.cat === cat;
                return matchesSearch && matchesCat;
            });

            document.getElementById('hitos-list').innerHTML = filtered.map(m => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div>
                        <h4 class="font-bold text-sm text-slate-800">${m.concepto}</h4>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${m.cat} ${m.subcat !== '-' ? ' > ' + m.subcat : ''}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${m.tipo === 'Venta' ? 'text-green-600' : 'text-red-600'} text-sm">${m.tipo === 'Venta' ? '+' : '-'}${formatMoneda(m.monto)}</p>
                        <button onclick="borrarMov(${m.id})" class="text-[8px] font-black text-slate-300">ELIMINAR</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPendientes() {
            // Lógica de suma y resta por concepto (persona)
            const mapSaldos = {};
            db.movs.forEach(m => {
                if(!mapSaldos[m.concepto]) mapSaldos[m.concepto] = 0;
                // Si es venta suma a mi favor, si es gasto resta de mi favor.
                // Pero lo que importa es si está Pendiente vs Pagado.
                if(m.estado === 'Pendiente') {
                    mapSaldos[m.concepto] += (m.tipo === 'Venta' ? m.monto : -m.monto);
                }
            });

            let sumaTotal = 0;
            const container = document.getElementById('pendientes-list');
            container.innerHTML = Object.keys(mapSaldos).map(persona => {
                const saldo = mapSaldos[persona];
                if(saldo === 0) return '';
                sumaTotal += Math.abs(saldo);
                return `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-200">
                    <span class="font-bold text-slate-700">${persona}</span>
                    <div class="text-right">
                        <p class="font-black ${saldo > 0 ? 'text-green-600' : 'text-red-600'}">
                            ${saldo > 0 ? 'Me debe' : 'Debo'}: ${formatMoneda(Math.abs(saldo))}
                        </p>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('deuda-total-suma').innerText = formatMoneda(sumaTotal);
        }

        function addMaestro(key, inputId) {
            const val = document.getElementById(inputId).value.trim();
            if(val) {
                db[key].push(val);
                if(key === 'categories') db.subcategories[val] = [];
                document.getElementById(inputId).value = '';
                save();
                alert("Guardado");
            }
        }

        function addSubMaestro() {
            const cat = document.getElementById('m-cat-new').value; // Usa la seleccionada o escrita
            const sub = document.getElementById('m-sub-new').value.trim();
            if(!db.subcategories[cat]) db.subcategories[cat] = [];
            db.subcategories[cat].push(sub);
            document.getElementById('m-sub-new').value = '';
            save();
            alert("Sub-item vinculado");
        }

        function save() { localStorage.setItem('biz_v4', JSON.stringify(db)); }
        function borrarMov(id) { if(confirm("¿Eliminar?")){ db.movs = db.movs.filter(m => m.id !== id); save(); renderHitos(); } }
        function exportData() {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Backup_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        window.onload = () => nav('home');
    </script>
</body>
</html>
