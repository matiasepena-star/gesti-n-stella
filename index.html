<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business App Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold">🚀 Mi Negocio App</h1>
    </nav>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">Ingresos</p>
                <h2 id="totalVentas" class="text-2xl font-bold text-green-600">$0</h2>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-500">
                <p class="text-gray-500 text-sm">Gastos</p>
                <h2 id="totalGastos" class="text-2xl font-bold text-red-600">$0</h2>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">Balance</p>
                <h2 id="balance" class="text-2xl font-bold text-blue-600">$0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h3 class="font-bold mb-4">Registrar Movimiento</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <select id="tipo" class="border p-2 rounded">
                    <option value="venta">Venta (+)</option>
                    <option value="gasto">Gasto (-)</option>
                </select>
                <input type="text" id="concepto" placeholder="Concepto" class="border p-2 rounded">
                <input type="number" id="monto" placeholder="Monto" class="border p-2 rounded">
                <button onclick="agregarMovimiento()" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Guardar</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <canvas id="graficoVentas"></canvas>
        </div>
    </div>

    <script>
        let movimientos = JSON.parse(localStorage.getItem('movimientos')) || [];
        let chart;

        function agregarMovimiento() {
            const tipo = document.getElementById('tipo').value;
            const concepto = document.getElementById('concepto').value;
            const monto = parseFloat(document.getElementById('monto').value);

            if (!concepto || isNaN(monto)) return alert("Completa los datos");

            movimientos.push({ tipo, concepto, monto, fecha: new Date().toLocaleDateString() });
            localStorage.setItem('movimientos', JSON.stringify(movimientos));
            actualizarUI();
            
            document.getElementById('concepto').value = '';
            document.getElementById('monto').value = '';
        }

        function actualizarUI() {
            const v = movimientos.filter(m => m.tipo === 'venta').reduce((s, m) => s + m.monto, 0);
            const g = movimientos.filter(m => m.tipo === 'gasto').reduce((s, m) => s + m.monto, 0);

            document.getElementById('totalVentas').innerText = `$${v.toLocaleString()}`;
            document.getElementById('totalGastos').innerText = `$${g.toLocaleString()}`;
            document.getElementById('balance').innerText = `$${(v - g).toLocaleString()}`;
            
            renderGrafico(v, g);
        }

        function renderGrafico(v, g) {
            const ctx = document.getElementById('graficoVentas').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ingresos', 'Gastos'],
                    datasets: [{
                        label: 'Balance General',
                        data: [v, g],
                        backgroundColor: ['#22c55e', '#ef4444']
                    }]
                }
            });
        }
        actualizarUI();
    </script>
</body>
</html>
