<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stella Maris v7.5 Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background: #02040a; font-family: 'Plus Jakarta Sans', sans-serif; color: #f1f5f9;
            overflow-x: hidden; width: 100vw; position: fixed; height: 100%;
        }

        #main-scroll {
            height: calc(100% - 90px);
            overflow-y: auto; padding-bottom: 60px;
            -webkit-overflow-scrolling: touch;
        }

        .app-card { 
            background: linear-gradient(160deg, #0f172a 0%, #020617 100%); 
            border: 1px solid #1e293b; border-radius: 1.2rem;
        }

        /* TÍTULOS DE CAMPOS */
        .field-label { font-[10px] font-bold text-sky-400 uppercase tracking-tighter mb-1 ml-1 block; }

        .input-elite {
            background: #000000; border: 1px solid #334155; border-radius: 0.8rem;
            padding: 0.9rem; width: 100%; color: white; outline: none; transition: 0.2s;
            font-size: 15px;
        }
        .input-elite:focus { border-color: #38bdf8; background: #020617; }

        /* BOTÓN CON EFECTO DE HUNDIMIENTO REAL */
        .btn-elite {
            background: #0284c7; color: white; padding: 1.1rem; border-radius: 1rem;
            font-weight: 800; width: 100%; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.05s ease-in-out; border: none; cursor: pointer;
            box-shadow: 0 4px 0 #075985; margin-bottom: 4px;
        }
        .btn-elite:active { 
            transform: translateY(3px) scale(0.97); 
            box-shadow: 0 1px 0 #075985;
            filter: brightness(1.2);
        }
        .btn-red { background: #be123c; box-shadow: 0 4px 0 #881337; }
        .btn-red:active { box-shadow: 0 1px 0 #881337; }

        /* FILTROS */
        .filter-chip {
            padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 800;
            background: #1e293b; border: 1px solid #334155; color: #64748b; white-space: nowrap;
        }
        .filter-active { background: #38bdf8; border-color: #38bdf8; color: #020617; }

        /* NAVEGACIÓN */
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; color: #475569; }
        .nav-active { color: #38bdf8; }
        .nav-active i { transform: translateY(-3px); }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-[#02040a] border-b border-[#1e293b]">
        <div>
            <h1 class="text-xs font-black uppercase tracking-widest text-sky-500">Stella Maris</h1>
            <p class="text-[8px] text-slate-500 font-bold">V7.5 ELITE PERFORMANCE</p>
        </div>
        <button onclick="deshacer()" class="text-[9px] text-rose-500 font-black px-3 py-2 border border-rose-500/20 rounded-lg active:scale-90">DESHACER</button>
    </header>

    <div id="main-scroll" class="px-5 pt-5 space-y-6">

        <section id="view-dash" class="view space-y-5">
            <div class="app-card p-6 text-center shadow-2xl">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Saldo Total</span>
                <h2 id="grand-total" class="text-4xl font-black text-white mt-1">$ 0</h2>
            </div>
            <div id="wallet-grid" class="space-y-3"></div>
        </section>

        <section id="view-venta" class="view hidden space-y-4">
            <div class="app-card p-6 space-y-4">
                <h3 class="text-center font-black text-sky-400 text-xs italic">NUEVA VENTA</h3>
                <div>
                    <span class="field-label">FECHA DE COBRO</span>
                    <input type="date" id="v-fecha" class="input-elite">
                </div>
                <div>
                    <span class="field-label">DÓNDE ENTRA EL DINERO</span>
                    <select id="v-wallet" class="input-elite"></select>
                </div>
                <div>
                    <span class="field-label">MONTO TOTAL $</span>
                    <input type="text" id="v-monto" inputmode="decimal" placeholder="0.000" class="input-elite text-2xl font-black text-center" oninput="formatInput(this)">
                </div>
                <div>
                    <span class="field-label">CLIENTE O NOTA</span>
                    <input type="text" id="v-nota" placeholder="..." class="input-elite">
                </div>
                <button onclick="saveMov('Venta')" class="btn-elite">Guardar Ingreso</button>
            </div>
        </section>

        <section id="view-gasto" class="view hidden space-y-4">
            <div class="app-card p-6 space-y-4">
                <h3 class="text-center font-black text-rose-500 text-xs italic">REGISTRAR EGRESO</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <span class="field-label">CATEGORÍA</span>
                        <select id="g-cat" onchange="loadSubs()" class="input-elite text-xs"></select>
                    </div>
                    <div>
                        <span class="field-label">SUBCATEGORÍA</span>
                        <select id="g-sub" class="input-elite text-xs"></select>
                    </div>
                </div>
                <div>
                    <span class="field-label">MONTO $</span>
                    <input type="text" id="g-monto" inputmode="decimal" placeholder="0.000" class="input-elite text-2xl font-black text-center" oninput="formatInput(this)">
                </div>
                <div>
                    <span class="field-label">MÉTODO DE PAGO</span>
                    <select id="g-wallet" class="input-elite"></select>
                </div>
                <div>
                    <span class="field-label">ESTADO DE CUENTA</span>
                    <select id="g-estado" class="input-elite font-bold">
                        <option value="Pagado">YA LO PAGUÉ</option>
                        <option value="Pendiente">LO DEBO (PENDIENTE)</option>
                    </select>
                </div>
                <div>
                    <span class="field-label">PROVEEDOR / NOTA</span>
                    <input type="text" id="g-nota" placeholder="..." class="input-elite">
                </div>
                <button onclick="saveMov('Gasto')" class="btn-elite btn-red">Guardar Gasto</button>
            </div>
        </section>

        <section id="view-hitos" class="view hidden space-y-4">
            <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
                <button onclick="filterH('Todo')" id="f-Todo" class="filter-chip filter-active">TODO</button>
                <button onclick="filterH('Venta')" id="f-Venta" class="filter-chip">VENTAS</button>
                <button onclick="filterH('Pagado')" id="f-Pagado" class="filter-chip">PAGADOS</button>
                <button onclick="filterH('Pendiente')" id="f-Pendiente" class="filter-chip">DEUDAS</button>
            </div>
            <input type="text" id="h-search" onkeyup="renderHitos()" placeholder="Filtrar por nombre o nota..." class="input-elite text-xs">
            <div id="hitos-list" class="space-y-2"></div>
        </section>

        <section id="view-deudas" class="view hidden space-y-4">
            <div id="deudas-list" class="space-y-3"></div>
        </section>

        <section id="view-config" class="view hidden space-y-4 pb-20">
            <div class="app-card p-5 space-y-4">
                <span class="field-label">GESTIÓN DE MAESTROS</span>
                <input type="text" id="cfg-wall" placeholder="Nuevo Banco o Billetera" class="input-elite">
                <button onclick="addCfg('wall')" class="btn-elite bg-slate-700 shadow-slate-900">+</button>
                <div class="flex gap-2">
                    <input type="text" id="cfg-cat" placeholder="Nueva Categoría" class="input-elite w-1/2 text-xs">
                    <button onclick="addCfg('cat')" class="btn-elite bg-slate-700 shadow-slate-900 w-1/2">+</button>
                </div>
            </div>
            <div id="cfg-list" class="space-y-2"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 w-full h-[85px] bg-black border-t border-[#1e293b] flex justify-around items-center px-2">
        <button onclick="nav('dash')" id="n-dash" class="nav-link"><i class="fas fa-wallet mb-1"></i><span class="text-[7px] font-black uppercase">Saldos</span></button>
        <button onclick="nav('venta')" id="n-venta" class="nav-link"><i class="fas fa-plus-circle mb-1"></i><span class="text-[7px] font-black uppercase">Venta</span></button>
        <button onclick="nav('gasto')" id="n-gasto" class="nav-link"><i class="fas fa-minus-circle mb-1"></i><span class="text-[7px] font-black uppercase">Gasto</span></button>
        <button onclick="nav('hitos')" id="n-hitos" class="nav-link"><i class="fas fa-receipt mb-1"></i><span class="text-[7px] font-black uppercase">Hitos</span></button>
        <button onclick="nav('deudas')" id="n-deudas" class="nav-link"><i class="fas fa-clock mb-1"></i><span class="text-[7px] font-black uppercase">Deudas</span></button>
        <button onclick="nav('config')" id="n-config" class="nav-link"><i class="fas fa-tools mb-1"></i><span class="text-[7px] font-black uppercase">Config</span></button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('sm_v75')) || { cats:['Prov'], subs:{'Prov':['General']}, walls:['Efectivo'], movs:[], real:{} };
        let currentFiltro = 'Todo';

        function nav(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(e => e.classList.remove('nav-active'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.getElementById('n-'+v).classList.add('nav-active');
            if(v==='dash') renderDash();
            if(v==='hitos') renderHitos();
            if(v==='deudas') renderDeudas();
            if(v==='config') renderCfg();
            setup();
        }

        function formatInput(el) {
            let v = el.value.replace(/\D/g, "");
            el.value = v ? new Intl.NumberFormat('es-AR').format(v) : "";
        }
        function parseM(v) { return parseFloat(v.toString().replace(/\./g, "")) || 0; }
        function formatM(n) { return '$ ' + Math.abs(n).toLocaleString('es-AR'); }

        function saveMov(tipo) {
            const pre = tipo === 'Venta' ? 'v' : 'g';
            const m = parseM(document.getElementById(pre+'-monto').value);
            if(!m) return;

            const entry = {
                id: Date.now(),
                fecha: document.getElementById(pre+'-fecha').value || new Date().toISOString().split('T')[0],
                tipo: tipo,
                cat: tipo === 'Venta' ? 'Venta' : document.getElementById('g-cat').value,
                subcat: tipo === 'Venta' ? 'Venta Directa' : document.getElementById('g-sub').value,
                monto: m,
                wallet: document.getElementById(pre+'-wallet').value,
                estado: tipo === 'Venta' ? 'Pagado' : document.getElementById('g-estado').value,
                nota: document.getElementById(pre+'-nota').value
            };

            db.movs.unshift(entry);
            save();
            
            // LIMPIEZA ABSOLUTA DE CAMPOS
            document.getElementById(pre+'-monto').value = "";
            document.getElementById(pre+'-nota').value = "";
            
            // Feedback visual rápido
            renderDash();
            alert("✓ Registrado y Campos Limpios");
        }

        function renderDash() {
            let total = 0;
            const html = db.walls.map(w => {
                const s = db.movs.filter(m => m.wallet === w && m.estado === 'Pagado').reduce((a,m) => m.tipo==='Venta'? a+m.monto : a-m.monto, 0);
                total += s;
                const r = db.real[w] || 0;
                return `
                <div class="app-card p-4 flex justify-between items-center border-l-4 ${s>=0?'border-sky-500':'border-rose-500'}">
                    <div><p class="text-[9px] font-black text-slate-500 uppercase">${w}</p><p class="text-xl font-black text-white">${formatM(s)}</p></div>
                    <div class="text-right">
                        <input type="text" class="bg-black/50 border border-slate-700 rounded p-1 w-24 text-center text-xs text-sky-400 font-bold" onchange="updReal('${w}', this.value)" value="${r?new Intl.NumberFormat('es-AR').format(r):''}" placeholder="REAL $">
                        <p class="text-[8px] font-bold mt-1 text-slate-500">DIF: ${formatM(r-s)}</p>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('wallet-grid').innerHTML = html;
            document.getElementById('grand-total').innerText = formatM(total);
        }

        function updReal(w, v) { db.real[w] = parseM(v); save(); renderDash(); }

        function filterH(f) {
            currentFiltro = f;
            document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('filter-active'));
            document.getElementById('f-'+f).classList.add('filter-active');
            renderHitos();
        }

        function renderHitos() {
            const s = document.getElementById('h-search').value.toLowerCase();
            const fil = db.movs.filter(m => {
                const search = (m.cat + m.subcat + m.nota).toLowerCase().includes(s);
                const filter = (currentFiltro==='Todo' || m.tipo === currentFiltro || m.estado === currentFiltro);
                return search && filter;
            });
            document.getElementById('hitos-list').innerHTML = fil.map(m => `
                <div class="app-card p-4 flex justify-between border-l-2 ${m.tipo==='Venta'?'border-sky-500':'border-rose-500'}">
                    <div class="text-[11px]"><b class="text-white uppercase">${m.subcat}</b><br><span class="text-slate-500 text-[9px]">${m.fecha} | ${m.wallet}</span><br><i class="text-slate-400 font-medium">${m.nota}</i></div>
                    <div class="text-right"><p class="font-black ${m.tipo==='Venta'?'text-sky-400':'text-rose-400'}">${m.tipo==='Venta'?'+':'-'}${formatM(m.monto)}</p><p class="text-[8px] uppercase font-black text-slate-600">${m.estado}</p></div>
                </div>`).join('');
        }

        function renderDeudas() {
            const res = {};
            db.movs.forEach(m => {
                if(m.tipo === 'Gasto') {
                    if(!res[m.subcat]) res[m.subcat] = 0;
                    m.estado === 'Pendiente' ? res[m.subcat] += m.monto : res[m.subcat] -= m.monto;
                }
            });
            document.getElementById('deudas-list').innerHTML = Object.keys(res).map(p => {
                if(res[p] <= 0) return '';
                return `<div class="app-card p-5 flex justify-between items-center"><span class="font-black text-xs text-white uppercase">${p}</span><span class="text-rose-500 font-black">DEBO ${formatM(res[p])}</span></div>`;
            }).join('') || '<p class="text-center text-slate-600 text-xs mt-10">SIN DEUDAS</p>';
        }

        function addCfg(t) {
            const v = document.getElementById('cfg-'+t).value;
            if(!v) return;
            if(t==='wall') db.walls.push(v);
            if(t==='cat') { db.cats.push(v); db.subs[v] = ['Varios']; }
            save(); renderCfg();
            document.getElementById('cfg-'+t).value = "";
        }

        function delCfg(t, n) {
            if(!confirm("¿Borrar?")) return;
            if(t==='wall') db.walls = db.walls.filter(x=>x!==n);
            if(t==='cat') db.cats = db.cats.filter(x=>x!==n);
            save(); renderCfg();
        }

        function renderCfg() {
            let h = '<div class="space-y-2">';
            db.walls.forEach(w => h += `<div class="app-card p-3 flex justify-between text-xs"><span>BANCO: <b>${w}</b></span><i onclick="delCfg('wall','${w}')" class="fas fa-trash text-rose-900"></i></div>`);
            db.cats.forEach(c => h += `<div class="app-card p-3 flex justify-between text-xs"><span>CAT: <b>${c}</b></span><i onclick="delCfg('cat','${c}')" class="fas fa-trash text-rose-900"></i></div>`);
            h += '</div>';
            document.getElementById('cfg-list').innerHTML = h;
            setup();
        }

        function setup() {
            const today = new Date().toISOString().split('T')[0];
            if(!document.getElementById('v-fecha').value) document.getElementById('v-fecha').value = today;
            const wH = db.walls.map(w => `<option value="${w}">${w}</option>`).join('');
            document.getElementById('v-wallet').innerHTML = wH;
            document.getElementById('g-wallet').innerHTML = wH;
            document.getElementById('g-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            loadSubs();
        }

        function loadSubs() {
            const c = document.getElementById('g-cat').value;
            document.getElementById('g-sub').innerHTML = (db.subs[c]||['General']).map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function save() { localStorage.setItem('sm_v75', JSON.stringify(db)); }
        function deshacer() { if(confirm("¿Borrar último?")) { db.movs.shift(); save(); nav('dash'); } }

        window.onload = () => nav('dash');
    </script>
</body>
</html>
