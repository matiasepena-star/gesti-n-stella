<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stella Maris v7.3 Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #05070a; font-family: 'Plus Jakarta Sans', sans-serif; color: #e2e8f0;
            overflow-x: hidden; width: 100vw; position: fixed; height: 100%;
        }

        /* Contenedor con scroll solo vertical */
        #main-scroll {
            height: calc(100% - 80px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        .app-card { background: #111418; border: 1px solid #1f242b; border-radius: 1.2rem; }
        .input-field { background: #090b0e; border: 1px solid #2d333b; border-radius: 0.8rem; padding: 0.8rem; width: 100%; color: white; outline: none; }
        
        /* BOTONES DE NAVEGACIÓN - RESPUESTA INMEDIATA */
        .nav-btn {
            background: none; border: none; flex: 1; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #484f58; font-size: 1.2rem;
        }
        .nav-active { color: #58a6ff; font-weight: 800; border-top: 3px solid #58a6ff; background: rgba(88,166,255,0.05); }

        .btn-main { background: #238636; color: white; padding: 1rem; border-radius: 0.8rem; font-weight: 800; width: 100%; text-transform: uppercase; }
        .btn-gasto { background: #da3633; }
        
        .cash-real { background: rgba(0,0,0,0.4); border: 1px solid #30363d; border-radius: 0.5rem; width: 90px; text-align: right; padding: 2px 5px; font-size: 11px; color: #58a6ff; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-[#05070a] border-b border-[#1f242b]">
        <h1 class="text-[10px] font-black uppercase tracking-widest text-blue-500">Stella Maris v7.3</h1>
        <button onclick="deshacer()" class="text-[9px] border border-red-500/30 text-red-500 px-3 py-1 rounded-full uppercase font-bold">Deshacer</button>
    </header>

    <div id="main-scroll" class="px-5 pt-4 space-y-6">

        <section id="view-dash" class="view space-y-4">
            <div class="app-card p-6 text-center">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Disponible Total</p>
                <h2 id="grand-total" class="text-3xl font-black">$ 0</h2>
                <div class="h-24 mt-2"><canvas id="miniChart"></canvas></div>
            </div>
            <div id="wallet-grid" class="space-y-3"></div>
        </section>

        <section id="view-venta" class="view hidden space-y-4">
            <div class="app-card p-5 space-y-4">
                <h2 class="text-blue-500 font-bold text-center text-xs uppercase">Nuevo Ingreso</h2>
                <input type="date" id="v-fecha" class="input-field">
                <select id="v-wallet" class="input-field"></select>
                <input type="text" id="v-monto" inputmode="decimal" placeholder="Monto $ 0" class="input-field text-2xl font-bold text-center" oninput="formatInput(this)">
                <input type="text" id="v-nota" placeholder="Nota..." class="input-field">
                <button onclick="saveMov('Venta')" class="btn-main">Guardar Venta</button>
            </div>
        </section>

        <section id="view-gasto" class="view hidden space-y-4">
            <div class="app-card p-5 space-y-4">
                <h2 class="text-red-500 font-bold text-center text-xs uppercase">Nuevo Gasto</h2>
                <div class="grid grid-cols-2 gap-2">
                    <select id="g-cat" onchange="loadSubs()" class="input-field text-xs"></select>
                    <select id="g-sub" class="input-field text-xs"></select>
                </div>
                <input type="text" id="g-monto" inputmode="decimal" placeholder="Monto $ 0" class="input-field text-2xl font-bold text-center" oninput="formatInput(this)">
                <select id="g-wallet" class="input-field"></select>
                <select id="g-estado" class="input-field font-bold">
                    <option value="Pagado">Ya lo pagué</option>
                    <option value="Pendiente">Lo quedé debiendo</option>
                </select>
                <input type="text" id="g-nota" placeholder="Nota..." class="input-field">
                <button onclick="saveMov('Gasto')" class="btn-main btn-gasto">Guardar Gasto</button>
            </div>
        </section>

        <section id="view-hitos" class="view hidden space-y-4">
            <div class="flex gap-2">
                <input type="text" id="h-search" onkeyup="renderHitos()" placeholder="Buscar..." class="input-field text-xs">
                <select id="h-filtro" onchange="renderHitos()" class="input-field text-xs w-1/3">
                    <option value="Todo">Todo</option>
                    <option value="Pagado">Pagados</option>
                    <option value="Pendiente">Deudas</option>
                </select>
            </div>
            <div id="hitos-list" class="space-y-2"></div>
        </section>

        <section id="view-deudas" class="view hidden space-y-4">
            <div id="deudas-list" class="space-y-2"></div>
        </section>

        <section id="view-config" class="view hidden space-y-4 pb-20">
            <div class="app-card p-5 space-y-3">
                <input type="text" id="cfg-cat" placeholder="Nueva Categoría" class="input-field">
                <button onclick="addCfg('cat')" class="w-full bg-slate-800 py-2 rounded-lg">+</button>
                <div class="flex gap-2">
                    <select id="cfg-cat-sel" class="input-field w-1/2 text-xs"></select>
                    <input type="text" id="cfg-sub" placeholder="Nueva Sub" class="input-field w-1/2">
                </div>
                <button onclick="addCfg('sub')" class="w-full bg-slate-800 py-2 rounded-lg">+</button>
                <input type="text" id="cfg-wall" placeholder="Nuevo Banco" class="input-field">
                <button onclick="addCfg('wall')" class="w-full bg-slate-800 py-2 rounded-lg">+</button>
            </div>
            <div id="cfg-list" class="space-y-2"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 w-full h-20 bg-[#090b0e] border-t border-[#1f242b] flex">
        <button onclick="nav('dash')" id="n-dash" class="nav-btn"><i class="fas fa-chart-line"></i><span class="text-[8px] mt-1">DASH</span></button>
        <button onclick="nav('venta')" id="n-venta" class="nav-btn"><i class="fas fa-plus-circle"></i><span class="text-[8px] mt-1">VENTA</span></button>
        <button onclick="nav('gasto')" id="n-gasto" class="nav-btn"><i class="fas fa-minus-circle"></i><span class="text-[8px] mt-1">GASTO</span></button>
        <button onclick="nav('hitos')" id="n-hitos" class="nav-btn"><i class="fas fa-history"></i><span class="text-[8px] mt-1">MOVS</span></button>
        <button onclick="nav('deudas')" id="n-deudas" class="nav-btn"><i class="fas fa-user-clock"></i><span class="text-[8px] mt-1">DEUDAS</span></button>
        <button onclick="nav('config')" id="n-config" class="nav-btn"><i class="fas fa-cog"></i><span class="text-[8px] mt-1">CONFIG</span></button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('sm_v73')) || { cats:['Prov'], subs:{'Prov':['Varios']}, walls:['Efectivo'], movs:[], real:{} };
        let myChart = null;

        function nav(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('nav-active'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.getElementById('n-'+v).classList.add('nav-active');
            if(v==='dash') renderDash();
            if(v==='hitos') renderHitos();
            if(v==='deudas') renderDeudas();
            if(v==='config') renderCfg();
            setup();
        }

        function formatInput(el) {
            let v = el.value.replace(/\D/g, "");
            el.value = v ? new Intl.NumberFormat('es-AR').format(v) : "";
        }
        function parseM(v) { return parseFloat(v.toString().replace(/\./g, "")) || 0; }
        function formatM(n) { return '$ ' + Math.abs(n).toLocaleString('es-AR'); }

        function saveMov(tipo) {
            const prefix = tipo === 'Venta' ? 'v' : 'g';
            const m = parseM(document.getElementById(prefix+'-monto').value);
            if(!m) return;
            const nuevo = {
                id: Date.now(),
                fecha: tipo === 'Venta' ? document.getElementById('v-fecha').value : new Date().toISOString().split('T')[0],
                tipo: tipo,
                cat: tipo === 'Venta' ? 'Ventas' : document.getElementById('g-cat').value,
                subcat: tipo === 'Venta' ? 'Venta Directa' : document.getElementById('g-sub').value,
                monto: m,
                wallet: document.getElementById(prefix+'-wallet').value,
                estado: tipo === 'Venta' ? 'Pagado' : document.getElementById('g-estado').value,
                nota: document.getElementById(prefix+'-nota').value
            };
            db.movs.unshift(nuevo);
            save(); alert("Guardado");
            document.getElementById(prefix+'-monto').value = "";
        }

        function renderDash() {
            let total = 0;
            const html = db.walls.map(w => {
                const s = db.movs.filter(m => m.wallet === w && m.estado === 'Pagado').reduce((a,m) => m.tipo==='Venta'? a+m.monto : a-m.monto, 0);
                total += s;
                const r = db.real[w] || 0;
                return `
                <div class="app-card p-4 flex justify-between items-center">
                    <div><p class="text-[9px] uppercase font-bold text-slate-500">${w}</p><p class="text-xl font-black">${formatM(s)}</p></div>
                    <div class="text-right">
                        <input type="text" class="cash-real" onchange="updReal('${w}', this.value)" value="${r?new Intl.NumberFormat('es-AR').format(r):''}" placeholder="Real $">
                        <p class="text-[8px] font-bold mt-1 ${r-s===0?'text-green-500':'text-orange-500'}">DIF: ${formatM(r-s)}</p>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('wallet-grid').innerHTML = html;
            document.getElementById('grand-total').innerText = formatM(total);
            updateChart();
        }

        function updReal(w, v) { db.real[w] = parseM(v); save(); renderDash(); }

        function renderHitos() {
            const s = document.getElementById('h-search').value.toLowerCase();
            const f = document.getElementById('h-filtro').value;
            const filtered = db.movs.filter(m => {
                const match = (m.subcat + m.nota).toLowerCase().includes(s);
                return match && (f === 'Todo' || m.estado === f);
            });
            document.getElementById('hitos-list').innerHTML = filtered.map(m => `
                <div class="app-card p-3 flex justify-between border-l-4 ${m.tipo==='Venta'?'border-blue-500':'border-red-500'}">
                    <div class="text-[10px]"><b>${m.subcat}</b><br><span class="text-slate-500">${m.fecha} | ${m.wallet}</span></div>
                    <div class="text-right"><p class="font-black ${m.tipo==='Venta'?'text-blue-400':'text-red-400'}">${m.tipo==='Venta'?'+':'-'}${formatM(m.monto)}</p><p class="text-[8px] uppercase">${m.estado}</p></div>
                </div>`).join('');
        }

        function renderDeudas() {
            const res = {};
            db.movs.forEach(m => {
                if(m.tipo === 'Gasto') {
                    if(!res[m.subcat]) res[m.subcat] = 0;
                    m.estado === 'Pendiente' ? res[m.subcat] += m.monto : res[m.subcat] -= m.monto;
                }
            });
            document.getElementById('deudas-list').innerHTML = Object.keys(res).map(p => {
                if(res[p] <= 0) return '';
                return `<div class="app-card p-4 flex justify-between"><b>${p}</b><span class="text-red-400 font-bold">DEBO ${formatM(res[p])}</span></div>`;
            }).join('') || '<p class="text-center text-xs text-slate-500">Sin deudas</p>';
        }

        function addCfg(t) {
            if(t==='cat') { const v=document.getElementById('cfg-cat').value; if(v){db.cats.push(v); db.subs[v]=[];}}
            if(t==='sub') { const c=document.getElementById('cfg-cat-sel').value; const v=document.getElementById('cfg-sub').value; if(v){db.subs[c].push(v);}}
            if(t==='wall') { const v=document.getElementById('cfg-wall').value; if(v)db.walls.push(v);}
            save(); renderCfg();
        }

        function delCfg(t, n, p) {
            if(!confirm("¿Borrar?")) return;
            if(t==='cat') { db.cats = db.cats.filter(x=>x!==n); delete db.subs[n]; }
            if(t==='sub') db.subs[p] = db.subs[p].filter(x=>x!==n);
            if(t==='wall') db.walls = db.walls.filter(x=>x!==n);
            save(); renderCfg();
        }

        function renderCfg() {
            let h = '';
            db.cats.forEach(c => {
                h += `<div class="app-card p-3 mb-2"><div class="flex justify-between font-bold text-blue-400 uppercase text-[10px]"><span>${c}</span><i onclick="delCfg('cat','${c}')" class="fas fa-trash text-red-900"></i></div>`;
                (db.subs[c]||[]).forEach(s => {
                    h += `<div class="flex justify-between text-[9px] pl-4 mt-1"><span>${s}</span><i onclick="delCfg('sub','${s}','${c}')" class="fas fa-times"></i></div>`;
                });
                h += `</div>`;
            });
            h += `<div class="app-card p-3 text-[9px]">BANCOS: ${db.walls.map(w => `${w} <i onclick="delCfg('wall','${w}')" class="fas fa-times mr-2 text-red-500"></i>`).join(' | ')}</div>`;
            document.getElementById('cfg-list').innerHTML = h;
            setup();
        }

        function setup() {
            const today = new Date().toISOString().split('T')[0];
            if(!document.getElementById('v-fecha').value) document.getElementById('v-fecha').value = today;
            const wH = db.walls.map(w => `<option value="${w}">${w}</option>`).join('');
            document.getElementById('v-wallet').innerHTML = wH;
            document.getElementById('g-wallet').innerHTML = wH;
            document.getElementById('cfg-cat-sel').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('g-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            loadSubs();
        }

        function loadSubs() {
            const c = document.getElementById('g-cat').value;
            document.getElementById('g-sub').innerHTML = (db.subs[c]||[]).map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function updateChart() {
            const ctx = document.getElementById('miniChart').getContext('2d');
            const v = db.movs.filter(m => m.tipo==='Venta').reduce((a,b)=>a+b.monto,0);
            const g = db.movs.filter(m => m.tipo==='Gasto').reduce((a,b)=>a+b.monto,0);
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type:'bar', data:{ labels:['V','G'], datasets:[{data:[v,g], backgroundColor:['#3b82f6','#ef4444']}]}, options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }});
        }

        function save() { localStorage.setItem('sm_v73', JSON.stringify(db)); }
        function deshacer() { if(confirm("¿Borrar último?")) { db.movs.shift(); save(); nav('dash'); } }

        window.onload = () => nav('dash');
    </script>
</body>
</html>
