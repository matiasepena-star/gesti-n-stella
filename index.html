<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business OS | Premium Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .btn-active:active { transform: scale(0.95); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 p-2 rounded-lg"><i class="fas fa-chart-line text-xl"></i></div>
                <h1 class="font-bold text-xl tracking-tight">BusinessOS <span class="text-indigo-300 font-light text-sm">v2.0</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="exportData()" class="p-2 hover:bg-indigo-800 rounded-full transition" title="Exportar Backup"><i class="fas fa-file-export"></i></button>
                <button onclick="document.getElementById('importFile').click()" class="p-2 hover:bg-indigo-800 rounded-full transition" title="Importar Backup"><i class="fas fa-file-import"></i></button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-8">
        
        <section>
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Disponibilidad en Billeteras</h2>
            <div id="walletsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <aside class="lg:col-span-4 space-y-6">
                
                <div class="bg-white p-6 rounded-2xl border card-shadow">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-folder-plus text-indigo-500"></i> Maestros</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Categoría / Subcategoría</label>
                            <div class="flex gap-2 mt-1">
                                <input id="newCat" type="text" placeholder="Ej: Ventas > Local" class="w-full text-sm border-slate-200 rounded-lg p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                                <button onclick="addMaster('categories', 'newCat')" class="bg-indigo-600 text-white px-3 rounded-lg btn-active hover:bg-indigo-700 transition">+</button>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Método de Pago</label>
                            <div class="flex gap-2 mt-1">
                                <input id="newWallet" type="text" placeholder="Ej: Mercado Pago" class="w-full text-sm border-slate-200 rounded-lg p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                                <button onclick="addMaster('wallets', 'newWallet')" class="bg-indigo-600 text-white px-3 rounded-lg btn-active hover:bg-indigo-700 transition">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border card-shadow border-t-4 border-t-indigo-500">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2"><i class="fas fa-plus-circle text-indigo-500"></i> Nuevo Registro</h3>
                    <div class="space-y-4">
                        <div class="flex p-1 bg-slate-100 rounded-xl">
                            <button onclick="setTipo('Venta')" id="btnVenta" class="flex-1 py-2 rounded-lg font-bold transition text-sm">VENTA</button>
                            <button onclick="setTipo('Gasto')" id="btnGasto" class="flex-1 py-2 rounded-lg font-bold transition text-sm">GASTO</button>
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Concepto / Detalle</label>
                            <input id="m_concepto" type="text" placeholder="Ej: Venta Juan Pérez" class="w-full border-slate-200 rounded-lg p-2 outline-none focus:border-indigo-500">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Categoría</label>
                                <select id="m_cat" class="w-full border-slate-200 rounded-lg p-2 outline-none text-sm"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Método</label>
                                <select id="m_wallet" class="w-full border-slate-200 rounded-lg p-2 outline-none text-sm"></select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Monto ($)</label>
                                <input id="m_monto" type="number" placeholder="0.00" class="w-full border-slate-200 rounded-lg p-2 font-bold text-lg outline-none text-indigo-700">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Estado</label>
                                <select id="m_estado" class="w-full border-slate-200 rounded-lg p-2 outline-none text-sm">
                                    <option value="Pagado">Pagado</option>
                                    <option value="Pendiente">Pendiente</option>
                                </select>
                            </div>
                        </div>

                        <button onclick="saveMovimiento()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 btn-active transition mt-2">
                            GUARDAR MOVIMIENTO
                        </button>
                    </div>
                </div>
            </aside>

            <div class="lg:col-span-8 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl border card-shadow">
                        <canvas id="chartPie" style="max-height: 200px;"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border card-shadow flex flex-col justify-center text-center">
                        <p class="text-slate-400 text-sm font-medium">Utilidad Neta del Período</p>
                        <h2 id="utilidadNeta" class="text-4xl font-black text-slate-800 mt-2">$0</h2>
                        <div id="utilidadBadge" class="mt-2 inline-block px-3 py-1 rounded-full text-xs font-bold mx-auto"></div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl border card-shadow flex flex-wrap gap-4 items-center">
                    <div class="relative flex-1 min-w-[200px]">
                        <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                        <input type="text" id="f_search" onkeyup="actualizarUI()" placeholder="Buscar por concepto o categoría..." class="w-full pl-10 pr-4 py-2 border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                    </div>
                    <select id="f_mes" onchange="actualizarUI()" class="border-slate-200 rounded-xl p-2 text-sm bg-white outline-none">
                        <option value="All">Todos los meses</option>
                        <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                        <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
                        <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
                        <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
                    </select>
                </div>

                <div class="bg-white rounded-2xl border card-shadow overflow-hidden">
                    <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-700">Historial de Movimientos</h3>
                        <span id="contadorReg" class="text-xs font-bold text-slate-400 bg-white px-2 py-1 rounded border">0 Registros</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-slate-400 font-bold border-b text-[10px] uppercase">
                                    <th class="p-4">Fecha</th>
                                    <th class="p-4">Concepto</th>
                                    <th class="p-4 text-right">Monto</th>
                                    <th class="p-4">Estado</th>
                                    <th class="p-4 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- BASE DE DATOS ---
        let db = JSON.parse(localStorage.getItem('biz_db_v2')) || {
            categories: ['Ventas > Producto', 'Ventas > Servicios', 'Gastos > Fijo', 'Gastos > Variable', 'Inversión'],
            wallets: ['Efectivo', 'Mercado Pago', 'Brubank', 'Banco Santander'],
            movimientos: []
        };
        
        let currentTipo = 'Venta';
        let pieC;

        // --- INICIALIZACIÓN ---
        function init() {
            setTipo('Venta');
            renderSelects();
            actualizarUI();
        }

        function setTipo(t) {
            currentTipo = t;
            const v = document.getElementById('btnVenta');
            const g = document.getElementById('btnGasto');
            if(t === 'Venta') {
                v.className = "flex-1 py-2 rounded-lg font-bold transition text-sm bg-green-500 text-white shadow-md shadow-green-200";
                g.className = "flex-1 py-2 rounded-lg font-bold transition text-sm text-slate-400 hover:text-slate-600";
            } else {
                g.className = "flex-1 py-2 rounded-lg font-bold transition text-sm bg-red-500 text-white shadow-md shadow-red-200";
                v.className = "flex-1 py-2 rounded-lg font-bold transition text-sm text-slate-400 hover:text-slate-600";
            }
        }

        function addMaster(key, inputId) {
            const val = document.getElementById(inputId).value.trim();
            if(val) {
                db[key].push(val);
                document.getElementById(inputId).value = '';
                renderSelects();
                save();
            }
        }

        function saveMovimiento() {
            const concepto = document.getElementById('m_concepto').value;
            const monto = parseFloat(document.getElementById('m_monto').value);
            
            if(!concepto || isNaN(monto)) {
                alert("Por favor completa concepto y monto.");
                return;
            }

            const mov = {
                id: Date.now(),
                tipo: currentTipo,
                fecha: new Date().toISOString(),
                concepto: concepto,
                cat: document.getElementById('m_cat').value,
                wallet: document.getElementById('m_wallet').value,
                monto: monto,
                estado: document.getElementById('m_estado').value
            };

            db.movimientos.unshift(mov);
            save();
            document.getElementById('m_concepto').value = '';
            document.getElementById('m_monto').value = '';
            actualizarUI();
        }

        function deleteMov(id) {
            if(confirm("¿Eliminar este registro?")) {
                db.movimientos = db.movimientos.filter(m => m.id !== id);
                save();
                actualizarUI();
            }
        }

        function toggleEstado(id) {
            const mov = db.movimientos.find(m => m.id === id);
            mov.estado = mov.estado === 'Pagado' ? 'Pendiente' : 'Pagado';
            save();
            actualizarUI();
        }

        function save() {
            localStorage.setItem('biz_db_v2', JSON.stringify(db));
        }

        // --- RENDERIZADO ---
        function renderSelects() {
            const cSel = document.getElementById('m_cat');
            const wSel = document.getElementById('m_wallet');
            cSel.innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            wSel.innerHTML = db.wallets.map(w => `<option value="${w}">${w}</option>`).join('');
        }

        function actualizarUI() {
            const search = document.getElementById('f_search').value.toLowerCase();
            const mesSel = document.getElementById('f_mes').value;

            const filtrados = db.movimientos.filter(m => {
                const date = new Date(m.fecha);
                const matchesSearch = m.concepto.toLowerCase().includes(search) || m.cat.toLowerCase().includes(search);
                const matchesMes = mesSel === "All" || date.getMonth().toString() === mesSel;
                return matchesSearch && matchesMes;
            });

            // Totales por Billetera
            const wCont = document.getElementById('walletsContainer');
            wCont.innerHTML = db.wallets.map(w => {
                const total = db.movimientos
                    .filter(m => m.wallet === w && m.estado === 'Pagado')
                    .reduce((acc, m) => m.tipo === 'Venta' ? acc + m.monto : acc - m.monto, 0);
                return `
                    <div class="bg-white p-4 rounded-2xl border card-shadow">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">${w}</p>
                        <h4 class="text-xl font-black ${total >= 0 ? 'text-indigo-600' : 'text-red-500'} mt-1">$${total.toLocaleString()}</h4>
                    </div>
                `;
            }).join('');

            // Totales KPI
            const ingresos = filtrados.filter(m => m.tipo === 'Venta').reduce((a, b) => a + b.monto, 0);
            const gastos = filtrados.filter(m => m.tipo === 'Gasto').reduce((a, b) => a + b.monto, 0);
            const utilidad = ingresos - gastos;

            document.getElementById('utilidadNeta').innerText = `$${utilidad.toLocaleString()}`;
            const badge = document.getElementById('utilidadBadge');
            badge.innerText = utilidad >= 0 ? 'RENDIMIENTO POSITIVO' : 'DÉFICIT EN PERÍODO';
            badge.className = `mt-2 inline-block px-3 py-1 rounded-full text-[9px] font-black mx-auto ${utilidad >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;

            // Tabla
            document.getElementById('contadorReg').innerText = `${filtrados.length} Registros`;
            const body = document.getElementById('tablaBody');
            body.innerHTML = filtrados.map(m => {
                const d = new Date(m.fecha);
                return `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4">
                        <p class="font-bold text-slate-700">${d.getDate()}/${d.getMonth()+1}</p>
                        <p class="text-[10px] text-slate-400">${d.getFullYear()}</p>
                    </td>
                    <td class="p-4">
                        <p class="font-semibold text-slate-800">${m.concepto}</p>
                        <p class="text-[10px] bg-slate-100 text-slate-500 inline-block px-2 rounded-full mt-1">${m.cat} • ${m.wallet}</p>
                    </td>
                    <td class="p-4 text-right">
                        <p class="font-black ${m.tipo === 'Venta' ? 'text-green-600' : 'text-red-600'} text-base">
                            ${m.tipo === 'Venta' ? '+' : '-'}$${m.monto.toLocaleString()}
                        </p>
                    </td>
                    <td class="p-4">
                        <button onclick="toggleEstado(${m.id})" class="px-3 py-1 rounded-full text-[10px] font-black transition ${m.estado === 'Pagado' ? 'bg-green-500 text-white shadow-lg shadow-green-100' : 'bg-orange-400 text-white shadow-lg shadow-orange-100'}">
                            ${m.estado.toUpperCase()}
                        </button>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteMov(${m.id})" class="text-slate-300 hover:text-red-500 p-2 transition"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            }).join('');

            updateChart(ingresos, gastos);
        }

        function updateChart(i, g) {
            const ctx = document.getElementById('chartPie').getContext('2d');
            if(pieC) pieC.destroy();
            pieC = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ingresos', 'Gastos'],
                    datasets: [{
                        data: [i, g],
                        backgroundColor: ['#4ade80', '#f87171'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } } } }
                }
            });
        }

        // --- BACKUP ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `Backup_BusinessOS_${new Date().toLocaleDateString()}.json`);
            dl.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                db = JSON.parse(ev.target.result);
                save();
                init();
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = init;
    </script>
</body>
</html>
