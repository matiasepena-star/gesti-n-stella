<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stella Maris v7 | Sistema Contable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0c10; color: #e2e8f0; -webkit-tap-highlight-color: transparent; }
        .app-card { background: #161b22; border: 1px solid #30363d; border-radius: 1.2rem; transition: transform 0.2s; }
        .input-field { background: #0d1117; border: 1px solid #30363d; border-radius: 0.8rem; padding: 0.8rem; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: #58a6ff; }
        .tab-nav { color: #8b949e; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 0; border-top: 3px solid transparent; }
        .tab-active { color: #58a6ff; border-top-color: #58a6ff; background: rgba(88, 166, 255, 0.05); font-weight: 800; }
        .btn-guardar { background: #238636; color: white; padding: 1rem; border-radius: 0.8rem; font-weight: 800; width: 100%; text-transform: uppercase; }
        .btn-gasto { background: #da3633; }
        /* Animación para selección */
        .selected-row { border: 2px solid #58a6ff !important; transform: scale(1.02); }
    </style>
</head>
<body class="pb-32">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0a0c10]/95 backdrop-blur-md z-50 border-b border-[#30363d]">
        <h1 class="text-sm font-extrabold uppercase tracking-tighter">Stella Maris <span class="text-blue-500">v7</span></h1>
        <button onclick="deshacer()" class="text-[10px] bg-red-900/20 text-red-400 px-3 py-1 rounded border border-red-900/50 uppercase font-bold">Deshacer</button>
    </header>

    <main id="app-container" class="px-5 pt-4 space-y-6">

        <section id="view-dash" class="view space-y-4">
            <div class="app-card p-4">
                <canvas id="mainChart" height="150"></canvas>
            </div>
            <div id="wallet-grid" class="space-y-3"></div>
        </section>

        <section id="view-venta" class="view hidden space-y-4">
            <div class="app-card p-5 space-y-4 border-t-4 border-blue-500">
                <h2 class="text-center text-[10px] font-black uppercase text-blue-500">Registrar Ingreso</h2>
                <input type="date" id="v-fecha" class="input-field">
                <select id="v-wallet" class="input-field"></select>
                <input type="text" id="v-monto" inputmode="decimal" placeholder="Monto $ 0.000" class="input-field text-2xl font-bold text-center" oninput="formatInput(this)">
                <input type="text" id="v-nota" placeholder="Nota (opcional)" class="input-field">
                <button onclick="saveVenta()" class="btn-guardar">Guardar Venta</button>
            </div>
        </section>

        <section id="view-gasto" class="view hidden space-y-4">
            <div class="app-card p-5 space-y-4 border-t-4 border-red-500">
                <h2 class="text-center text-[10px] font-black uppercase text-red-500">Registrar Egreso</h2>
                <input type="date" id="g-fecha" class="input-field">
                <div class="grid grid-cols-2 gap-2">
                    <select id="g-cat" onchange="loadSubs()" class="input-field text-xs"></select>
                    <select id="g-sub" class="input-field text-xs"></select>
                </div>
                <input type="text" id="g-monto" inputmode="decimal" placeholder="Monto $ 0.000" class="input-field text-2xl font-bold text-center" oninput="formatInput(this)">
                <select id="g-wallet" class="input-field"></select>
                <select id="g-estado" class="input-field" onchange="toggleWalletGasto()">
                    <option value="Pagado">Ya lo pagué</option>
                    <option value="Pendiente">Lo debo / Pendiente</option>
                </select>
                <input type="text" id="g-nota" placeholder="Nota (opcional)" class="input-field">
                <button onclick="saveGasto()" class="btn-guardar btn-gasto">Guardar Gasto</button>
            </div>
        </section>

        <section id="view-hitos" class="view hidden space-y-4">
            <div class="flex gap-2">
                <input type="text" id="h-search" onkeyup="renderHitos()" placeholder="Buscar movimiento..." class="input-field text-xs">
                <select id="h-filtro" onchange="renderHitos()" class="input-field text-xs w-1/3">
                    <option value="Todo">Todo</option>
                    <option value="Venta">Ventas</option>
                    <option value="Gasto">Gastos</option>
                </select>
            </div>
            <div id="hitos-list" class="space-y-2"></div>
        </section>

        <section id="view-deudas" class="view hidden space-y-4">
            <div class="app-card p-4 text-center bg-red-900/10 border-red-900/30">
                <p class="text-[10px] font-bold text-red-400 uppercase">Total Deuda Acumulada</p>
                <h2 id="total-deuda" class="text-2xl font-black text-white">$ 0</h2>
            </div>
            <div id="deudas-list" class="space-y-2"></div>
        </section>

        <section id="view-config" class="view hidden space-y-6">
            <div class="app-card p-5 space-y-4">
                <p class="text-[10px] font-bold text-slate-500 uppercase">Categorías y Sub</p>
                <div class="flex gap-2">
                    <input type="text" id="m-new-cat" placeholder="Nueva Categoría" class="input-field">
                    <button onclick="addM('cat')" class="bg-blue-600 px-4 rounded">+</button>
                </div>
                <div class="flex gap-2">
                    <select id="m-cat-sel" class="input-field text-xs"></select>
                    <input type="text" id="m-new-sub" placeholder="Subcategoría" class="input-field">
                    <button onclick="addM('sub')" class="bg-blue-600 px-4 rounded">+</button>
                </div>
                <hr class="border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase">Bancos / Métodos</p>
                <div class="flex gap-2">
                    <input type="text" id="m-new-wall" placeholder="Ej: Brubank" class="input-field">
                    <button onclick="addM('wall')" class="bg-blue-600 px-4 rounded">+</button>
                </div>
            </div>
            <div id="config-list" class="space-y-2 pb-10"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0d1117] border-t border-[#30363d] flex z-50">
        <button onclick="nav('dash')" id="n-dash" class="tab-nav"><i class="fas fa-chart-pie"></i><span class="text-[8px]">Dash</span></button>
        <button onclick="nav('venta')" id="n-venta" class="tab-nav"><i class="fas fa-plus-circle text-blue-500"></i><span class="text-[8px]">Venta</span></button>
        <button onclick="nav('gasto')" id="n-gasto" class="tab-nav"><i class="fas fa-minus-circle text-red-500"></i><span class="text-[8px]">Gasto</span></button>
        <button onclick="nav('hitos')" id="n-hitos" class="tab-nav"><i class="fas fa-list"></i><span class="text-[8px]">Hitos</span></button>
        <button onclick="nav('deudas')" id="n-deudas" class="tab-nav"><i class="fas fa-clock"></i><span class="text-[8px]">Deudas</span></button>
        <button onclick="nav('config')" id="n-config" class="tab-nav"><i class="fas fa-cog"></i><span class="text-[8px]">Config</span></button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('sm_v7')) || { 
            cats: ['Proveedores'], 
            subs: { 'Proveedores': ['Varios'] }, 
            walls: ['Efectivo'], 
            movs: [],
            manualCash: {} 
        };
        let chart = null;

        function nav(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.tab-nav').forEach(e => e.classList.remove('tab-active'));
            document.getElementById('view-' + v).classList.remove('hidden');
            document.getElementById('n-' + v).classList.add('tab-active');
            
            if(v === 'dash') renderDash();
            if(v === 'hitos') renderHitos();
            if(v === 'deudas') renderDeudas();
            if(v === 'config') renderConfig();
            setupSelectors();
        }

        function formatInput(el) {
            let val = el.value.replace(/\D/g, "");
            el.value = val ? new Intl.NumberFormat('es-AR').format(val) : "";
        }
        function parseM(v) { return parseFloat(v.toString().replace(/\./g, "")) || 0; }
        function formatM(n) { return '$ ' + Math.abs(n).toLocaleString('es-AR'); }

        function toggleWalletGasto() {
            const e = document.getElementById('g-estado').value;
            const w = document.getElementById('g-wallet');
            w.disabled = (e === 'Pendiente');
            w.style.opacity = w.disabled ? '0.3' : '1';
        }

        // --- CORE LOGIC ---
        function saveVenta() {
            const m = parseM(document.getElementById('v-monto').value);
            if(!m) return;
            db.movs.unshift({ id: Date.now(), fecha: document.getElementById('v-fecha').value, tipo: 'Venta', cat: 'Ventas', subcat: 'Venta Directa', monto: m, wallet: document.getElementById('v-wallet').value, estado: 'Pagado', nota: document.getElementById('v-nota').value });
            save(); alert("Venta Guardada"); document.getElementById('v-monto').value = "";
        }

        function saveGasto() {
            const m = parseM(document.getElementById('g-monto').value);
            if(!m) return;
            db.movs.unshift({ id: Date.now(), fecha: document.getElementById('g-fecha').value, tipo: 'Gasto', cat: document.getElementById('g-cat').value, subcat: document.getElementById('g-sub').value, monto: m, wallet: document.getElementById('g-wallet').value, estado: document.getElementById('g-estado').value, nota: document.getElementById('g-nota').value });
            save(); alert("Gasto Guardado"); document.getElementById('g-monto').value = "";
        }

        function renderDash() {
            const pagados = db.movs.filter(m => m.estado === 'Pagado');
            let vT = 0, gT = 0;
            
            const html = db.walls.map(w => {
                const s = pagados.filter(m => m.wallet === w).reduce((a, m) => m.tipo === 'Venta' ? a + m.monto : a - m.monto, 0);
                const manual = db.manualCash[w] || 0;
                const diff = manual - s;
                return `
                <div class="app-card p-4 flex flex-col gap-3" onclick="verHitosMetodo('${w}')">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black uppercase text-slate-500">${w}</span>
                        <span class="font-bold text-lg ${s >= 0 ? 'text-blue-400' : 'text-red-400'}">${formatM(s)}</span>
                    </div>
                    <div class="flex gap-2 items-center bg-black/20 p-2 rounded-lg">
                        <input type="text" placeholder="Real..." class="w-1/2 bg-transparent text-xs outline-none" 
                            onchange="updateManual('${w}', this.value)" value="${manual ? new Intl.NumberFormat('es-AR').format(manual) : ''}" onclick="event.stopPropagation()">
                        <span class="text-[10px] font-bold ${diff === 0 ? 'text-green-500' : 'text-orange-400'}">${diff === 0 ? 'OK' : 'Dif: ' + formatM(diff)}</span>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('wallet-grid').innerHTML = html;
            
            // Totales para Gráfico
            vT = pagados.filter(m => m.tipo === 'Venta').reduce((a,b)=>a+b.monto, 0);
            gT = pagados.filter(m => m.tipo === 'Gasto').reduce((a,b)=>a+b.monto, 0);
            renderChart(vT, gT);
        }

        function updateManual(w, v) {
            db.manualCash[w] = parseM(v);
            save(); renderDash();
        }

        function verHitosMetodo(w) {
            nav('hitos');
            document.getElementById('h-search').value = w;
            renderHitos();
        }

        function renderHitos() {
            const s = document.getElementById('h-search').value.toLowerCase();
            const f = document.getElementById('h-filtro').value;
            const list = db.movs.filter(m => {
                const text = (m.subcat + m.wallet + m.nota).toLowerCase();
                return text.includes(s) && (f === 'Todo' || m.tipo === f);
            });
            
            document.getElementById('hitos-list').innerHTML = list.map(m => `
                <div class="app-card p-4 flex justify-between items-center text-xs border-l-4 ${m.tipo === 'Venta' ? 'border-blue-500' : 'border-red-500'}">
                    <div><p class="font-bold uppercase">${m.subcat}</p><p class="text-[9px] text-slate-500">${m.fecha} • ${m.wallet || 'Pend'}</p><p class="italic text-[8px]">${m.nota || ''}</p></div>
                    <p class="font-black text-sm ${m.tipo === 'Venta' ? 'text-blue-400' : 'text-red-400'}">${m.tipo === 'Venta' ? '+' : '-'}${formatM(m.monto)}</p>
                </div>`).join('');
        }

        function renderDeudas() {
            const saldos = {};
            // Lógica Crucial: Si es Pendiente suma deuda. Si se paga algo con el mismo nombre, resta.
            db.movs.forEach(m => {
                if(m.tipo === 'Gasto') {
                    if(!saldos[m.subcat]) saldos[m.subcat] = 0;
                    if(m.estado === 'Pendiente') saldos[m.subcat] += m.monto;
                    else saldos[m.subcat] -= m.monto; // Si se paga, resta de la deuda histórica de ese proveedor
                }
            });

            let total = 0;
            const html = Object.keys(saldos).map(p => {
                const s = saldos[p]; if(s <= 0) return '';
                total += s;
                return `<div class="app-card p-4 flex justify-between items-center"><span class="font-bold text-xs uppercase">${p}</span><span class="text-red-400 font-black">DEBO ${formatM(s)}</span></div>`;
            }).join('');
            
            document.getElementById('deudas-list').innerHTML = html || '<p class="text-center text-xs text-slate-500">No hay deudas pendientes</p>';
            document.getElementById('total-deuda').innerText = formatM(total);
        }

        // --- CONFIG ---
        function addM(type) {
            if(type === 'cat') { const v = document.getElementById('m-new-cat').value; if(v) { db.cats.push(v); db.subs[v] = []; } }
            if(type === 'sub') { const c = document.getElementById('m-cat-sel').value; const v = document.getElementById('m-new-sub').value; if(c && v) db.subs[c].push(v); }
            if(type === 'wall') { const v = document.getElementById('m-new-wall').value; if(v) db.walls.push(v); }
            save(); renderConfig();
        }

        function renderConfig() {
            let html = `<div class="app-card p-4 space-y-4 text-[10px] uppercase font-bold text-slate-500">`;
            db.cats.forEach(c => {
                html += `<div class="border-b border-slate-800 pb-2"><div class="text-blue-400 mb-1">${c}</div><div class="pl-3 space-y-1">${(db.subs[c]||[]).map(s => `<div>• ${s}</div>`).join('')}</div></div>`;
            });
            html += `<div>Métodos: ${db.walls.join(' | ')}</div></div>`;
            document.getElementById('config-list').innerHTML = html;
            setupSelectors();
        }

        function setupSelectors() {
            const t = new Date().toISOString().split('T')[0];
            if(!document.getElementById('v-fecha').value) document.getElementById('v-fecha').value = t;
            if(!document.getElementById('g-fecha').value) document.getElementById('g-fecha').value = t;
            
            const wH = db.walls.map(w => `<option value="${w}">${w}</option>`).join('');
            document.getElementById('v-wallet').innerHTML = wH;
            document.getElementById('g-wallet').innerHTML = wH;
            document.getElementById('m-cat-sel').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('g-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            loadSubs();
        }

        function loadSubs() {
            const c = document.getElementById('g-cat').value;
            document.getElementById('g-sub').innerHTML = (db.subs[c]||[]).map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function renderChart(v, g) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Ventas', 'Gastos'], datasets: [{ data: [v, g], backgroundColor: ['#3b82f6', '#ef4444'], borderWidth: 0 }] },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#8b949e', font: { size: 9 } } } }, cutout: '80%' }
            });
        }

        function save() { localStorage.setItem('sm_v7', JSON.stringify(db)); }
        function deshacer() { if(confirm("¿Borrar último?")) { db.movs.shift(); save(); nav('dash'); } }

        window.onload = () => nav('dash');
    </script>
</body>
</html>
