<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business OS Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .tab-active { color: #4f46e5; border-top: 3px solid #4f46e5; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .card-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-slate-200">
        <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Panel de Gestión</p>
            <h1 class="text-xl font-black text-indigo-900">BusinessOS</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="exportData()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-600"><i class="fas fa-share-nodes"></i></button>
            <div class="w-10 h-10 rounded-full bg-indigo-100 border-2 border-white shadow-sm flex items-center justify-center text-indigo-600 font-bold">ME</div>
        </div>
    </header>

    <main class="px-4 pt-6 pb-32 max-w-lg mx-auto space-y-8">
        
        <section id="view-home" class="view space-y-6">
            <div class="card-grad p-6 rounded-[2rem] text-white shadow-2xl shadow-indigo-200 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-indigo-100 text-sm opacity-80">Capital Disponible Total</p>
                    <h2 id="total-balance" class="text-4xl font-black mt-1">$ 0.00</h2>
                    <div class="flex gap-4 mt-6">
                        <div class="bg-white/20 p-3 rounded-2xl flex-1">
                            <p class="text-[10px] uppercase font-bold opacity-70">Ingresos</p>
                            <p id="total-ingresos" class="text-lg font-bold">+$0</p>
                        </div>
                        <div class="bg-white/20 p-3 rounded-2xl flex-1">
                            <p class="text-[10px] uppercase font-bold opacity-70">Gastos</p>
                            <p id="total-gastos" class="text-lg font-bold">-$0</p>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full"></div>
            </div>

            <div>
                <h3 class="font-bold text-slate-800 mb-3 px-2">Cuentas y Billeteras</h3>
                <div id="wallet-list" class="flex gap-4 overflow-x-auto pb-2 hide-scroll px-2">
                    </div>
            </div>

            <div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-amber-800 font-bold text-sm uppercase tracking-tight">Pendientes de Cobro/Pago</h3>
                    <span id="pending-count" class="bg-amber-200 text-amber-800 text-[10px] px-2 py-0.5 rounded-full font-black">0</span>
                </div>
                <div id="pending-list" class="space-y-2">
                    </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <canvas id="mainChart" height="250"></canvas>
            </div>
        </section>

        <section id="view-add" class="view hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h2 class="text-xl font-black mb-6">Nuevo Movimiento</h2>
                <div class="space-y-4">
                    <div class="flex p-1 bg-slate-100 rounded-2xl">
                        <button onclick="setMode('Venta')" id="mode-venta" class="flex-1 py-3 rounded-xl font-bold transition">VENTA</button>
                        <button onclick="setMode('Gasto')" id="mode-gasto" class="flex-1 py-3 rounded-xl font-bold transition text-slate-400">GASTO</button>
                    </div>
                    <input id="in-concepto" type="text" placeholder="¿Qué compraste o vendiste?" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="in-cat" class="bg-slate-50 p-4 rounded-2xl border-none text-sm font-bold"></select>
                        <select id="in-wallet" class="bg-slate-50 p-4 rounded-2xl border-none text-sm font-bold"></select>
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-4 font-bold text-slate-400">$</span>
                        <input id="in-monto" type="number" placeholder="0.00" class="w-full p-4 pl-8 rounded-2xl bg-slate-50 border-none text-2xl font-black text-indigo-600 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <select id="in-estado" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm">
                        <option value="Pagado">Ya pagado/cobrado</option>
                        <option value="Pendiente">Pendiente (A pagar/cobrar)</option>
                    </select>
                    <button onclick="saveData()" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black shadow-xl shadow-indigo-100 active:scale-95 transition">GUARDAR REGISTRO</button>
                </div>
            </div>
        </section>

        <section id="view-list" class="view hidden space-y-4">
            <div class="flex gap-2">
                <input type="text" id="search-bar" onkeyup="renderHistory()" placeholder="Buscar..." class="flex-1 p-3 rounded-xl bg-white border border-slate-200 outline-none">
                <button onclick="document.getElementById('importFile').click()" class="bg-white p-3 rounded-xl border border-slate-200 text-slate-400"><i class="fas fa-file-import"></i></button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </div>
            <div id="history-container" class="space-y-3">
                </div>
        </section>

        <section id="view-settings" class="view hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] border">
                <h3 class="font-bold mb-4">Añadir Maestros</h3>
                <input id="master-cat" type="text" placeholder="Nueva Categoría..." class="w-full p-3 rounded-xl bg-slate-50 mb-2 border-none">
                <button onclick="addMaster('categories', 'master-cat')" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold mb-6">Añadir Categoría</button>
                
                <input id="master-wall" type="text" placeholder="Nueva Billetera..." class="w-full p-3 rounded-xl bg-slate-50 mb-2 border-none">
                <button onclick="addMaster('wallets', 'master-wall')" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Añadir Billetera</button>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="w-full py-4 text-red-500 font-bold border-2 border-red-100 rounded-2xl mt-10">BORRAR TODOS LOS DATOS</button>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 px-6 py-3 flex justify-between items-center safe-area-bottom shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center gap-1 text-slate-400 tab-active">
            <i class="fas fa-house-chimney text-lg"></i>
            <span class="text-[10px] font-bold">Inicio</span>
        </button>
        <button onclick="switchTab('list')" id="tab-list" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-receipt text-lg"></i>
            <span class="text-[10px] font-bold">Hitos</span>
        </button>
        <button onclick="switchTab('add')" id="tab-add" class="flex flex-col items-center justify-center -mt-12 bg-indigo-600 w-14 h-14 rounded-full text-white shadow-xl shadow-indigo-200 border-4 border-white">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <button onclick="switchTab('settings')" id="tab-settings" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-sliders text-lg"></i>
            <span class="text-[10px] font-bold">Config</span>
        </button>
        <button onclick="exportData()" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-cloud-arrow-down text-lg"></i>
            <span class="text-[10px] font-bold">Backup</span>
        </button>
    </nav>

    <script>
        // DB INICIAL
        let db = JSON.parse(localStorage.getItem('biz_v3')) || {
            categories: ['Servicios', 'Venta Local', 'Marketing', 'Alquiler', 'Sueldos'],
            wallets: ['Mercado Pago', 'Brubank', 'Efectivo', 'Galicia'],
            movs: []
        };
        let currentMode = 'Venta';
        let mainChart;

        // SWITCH DE VISTAS
        function switchTab(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + viewId).classList.add('tab-active');
            
            if(viewId === 'home') renderDashboard();
            if(viewId === 'list') renderHistory();
            if(viewId === 'add') renderSelects();
        }

        function setMode(m) {
            currentMode = m;
            const v = document.getElementById('mode-venta');
            const g = document.getElementById('mode-gasto');
            if(m === 'Venta') {
                v.className = "flex-1 py-3 rounded-xl font-bold bg-white shadow-sm text-indigo-600";
                g.className = "flex-1 py-3 rounded-xl font-bold text-slate-400";
            } else {
                g.className = "flex-1 py-3 rounded-xl font-bold bg-white shadow-sm text-red-600";
                v.className = "flex-1 py-3 rounded-xl font-bold text-slate-400";
            }
        }

        function renderSelects() {
            document.getElementById('in-cat').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('in-wallet').innerHTML = db.wallets.map(w => `<option value="${w}">${w}</option>`).join('');
        }

        function saveData() {
            const concepto = document.getElementById('in-concepto').value;
            const monto = parseFloat(document.getElementById('in-monto').value);
            if(!concepto || isNaN(monto)) return alert("Completa los datos");

            const mov = {
                id: Date.now(),
                tipo: currentMode,
                concepto,
                cat: document.getElementById('in-cat').value,
                wallet: document.getElementById('in-wallet').value,
                monto,
                estado: document.getElementById('in-estado').value,
                fecha: new Date().toISOString()
            };

            db.movs.unshift(mov);
            saveToLocal();
            document.getElementById('in-concepto').value = '';
            document.getElementById('in-monto').value = '';
            switchTab('home');
        }

        function saveToLocal() {
            localStorage.setItem('biz_v3', JSON.stringify(db));
        }

        function renderDashboard() {
            // Totales
            const totalIng = db.movs.filter(m => m.tipo === 'Venta' && m.estado === 'Pagado').reduce((a, b) => a + b.monto, 0);
            const totalGas = db.movs.filter(m => m.tipo === 'Gasto' && m.estado === 'Pagado').reduce((a, b) => a + b.monto, 0);
            
            document.getElementById('total-balance').innerText = `$ ${(totalIng - totalGas).toLocaleString()}`;
            document.getElementById('total-ingresos').innerText = `+$${totalIng.toLocaleString()}`;
            document.getElementById('total-gastos').innerText = `-$${totalGas.toLocaleString()}`;

            // Listado de billeteras
            const wList = document.getElementById('wallet-list');
            wList.innerHTML = db.wallets.map(w => {
                const saldo = db.movs
                    .filter(m => m.wallet === w && m.estado === 'Pagado')
                    .reduce((acc, m) => m.tipo === 'Venta' ? acc + m.monto : acc - m.monto, 0);
                return `
                    <div class="min-w-[140px] bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${w}</p>
                        <p class="text-sm font-bold mt-1 ${saldo >= 0 ? 'text-indigo-600' : 'text-red-500'}">$${saldo.toLocaleString()}</p>
                    </div>
                `;
            }).join('');

            // Pendientes
            const pends = db.movs.filter(m => m.estado === 'Pendiente');
            document.getElementById('pending-count').innerText = pends.length;
            document.getElementById('pending-list').innerHTML = pends.slice(0,3).map(m => `
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl text-xs">
                    <span class="font-bold text-slate-700">${m.concepto}</span>
                    <span class="${m.tipo === 'Venta' ? 'text-green-600' : 'text-red-600'} font-black">$${m.monto.toLocaleString()}</span>
                </div>
            `).join('');

            updateChart(totalIng, totalGas);
        }

        function renderHistory() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = db.movs.filter(m => m.concepto.toLowerCase().includes(query) || m.cat.toLowerCase().includes(query));
            
            document.getElementById('history-container').innerHTML = filtered.map(m => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                    <div class="flex gap-4 items-center">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${m.tipo === 'Venta' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas ${m.tipo === 'Venta' ? 'fa-arrow-up' : 'fa-arrow-down'} text-xs"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-slate-800">${m.concepto}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${m.cat} • ${m.estado}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${m.tipo === 'Venta' ? 'text-green-600' : 'text-red-600'} text-sm">
                            ${m.tipo === 'Venta' ? '+' : '-'}$${m.monto.toLocaleString()}
                        </p>
                        <button onclick="deleteMov(${m.id})" class="text-[10px] text-slate-300 font-bold">ELIMINAR</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteMov(id) {
            db.movs = db.movs.filter(m => m.id !== id);
            saveToLocal();
            renderHistory();
        }

        function addMaster(key, inputId) {
            const val = document.getElementById(inputId).value;
            if(val) {
                db[key].push(val);
                document.getElementById(inputId).value = '';
                saveToLocal();
                alert("Guardado!");
            }
        }

        function updateChart(ing, gas) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ingresos', 'Gastos'],
                    datasets: [{
                        data: [ing, gas],
                        backgroundColor: ['#4f46e5', '#f1f5f9'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "backup_business.json");
            dlAnchor.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                db = JSON.parse(ev.target.result);
                saveToLocal();
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = () => {
            setMode('Venta');
            renderDashboard();
        };
    </script>
</body>
</html>
