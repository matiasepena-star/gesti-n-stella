<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stella Maris v7.2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        /* BLOQUEO DE SCROLL LATERAL */
        html, body { 
            max-width: 100%; 
            overflow-x: hidden; 
            position: relative;
            background: #05070a; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e2e8f0;
        }

        .app-card { background: #111418; border: 1px solid #1f242b; border-radius: 1.5rem; }
        
        /* INPUTS CON ONDA */
        .input-field { 
            background: #090b0e; 
            border: 1px solid #2d333b; 
            border-radius: 1rem; 
            padding: 0.9rem; 
            width: 100%; 
            color: white; 
            outline: none; 
            transition: all 0.2s;
        }
        .input-field:focus { border-color: #58a6ff; background: #0d1117; }

        /* NAVEGACIÓN TOTAL (Área de toque ampliada) */
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70px;
            color: #484f58;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-active { color: #58a6ff; background: rgba(88, 166, 255, 0.05); border-top: 2px solid #58a6ff; font-weight: 800; }
        
        .cash-input {
            background: rgba(0,0,0,0.3);
            border: 1px dashed #30363d;
            border-radius: 0.8rem;
            padding: 4px 8px;
            font-size: 12px;
            width: 100px;
            text-align: right;
            color: #8b949e;
        }

        /* BOTÓN GUARDAR ESTILO STELLA */
        .btn-confirm {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            padding: 1.2rem;
            border-radius: 1rem;
            font-weight: 800;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(46, 160, 67, 0.2);
        }
        .btn-red { background: linear-gradient(135deg, #da3633 0%, #f85149 100%); box-shadow: 0 4px 15px rgba(218, 54, 51, 0.2); }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#05070a]/90 backdrop-blur-xl z-50 border-b border-[#1f242b]">
        <h1 class="text-xs font-black uppercase tracking-[0.2em] text-blue-500">Stella Maris <span class="text-white">v7.2</span></h1>
        <button onclick="deshacer()" class="text-[9px] bg-red-500/10 text-red-500 px-4 py-2 rounded-full border border-red-500/20 font-black uppercase">Deshacer</button>
    </header>

    <main id="app-content" class="px-5 pt-4 space-y-6">

        <section id="view-dash" class="view space-y-5">
            <div class="app-card p-6 bg-gradient-to-br from-[#161b22] to-[#0d1117] relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500/10 rounded-full blur-3xl"></div>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Disponible</p>
                <h2 id="grand-total" class="text-4xl font-black text-white">$ 0</h2>
                <div class="mt-4 h-[100px] w-full">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div id="wallet-list" class="space-y-3"></div>
        </section>

        <section id="view-venta" class="view hidden space-y-4">
            <div class="app-card p-6 space-y-4">
                <h2 class="text-center text-xs font-black uppercase text-blue-500">Cargar Venta</h2>
                <input type="date" id="v-fecha" class="input-field">
                <select id="v-wallet" class="input-field"></select>
                <input type="text" id="v-monto" inputmode="decimal" placeholder="Monto $ 0" class="input-field text-3xl font-black text-center" oninput="formatInput(this)">
                <input type="text" id="v-nota" placeholder="Nota rápida..." class="input-field">
                <button onclick="saveVenta()" class="btn-confirm">Guardar Venta</button>
            </div>
        </section>

        <section id="view-gasto" class="view hidden space-y-4">
            <div class="app-card p-6 space-y-4">
                <h2 class="text-center text-xs font-black uppercase text-red-500">Cargar Egreso</h2>
                <input type="date" id="g-fecha" class="input-field">
                <div class="grid grid-cols-2 gap-2">
                    <select id="g-cat" onchange="loadSubs()" class="input-field text-xs"></select>
                    <select id="g-sub" class="input-field text-xs"></select>
                </div>
                <input type="text" id="g-monto" inputmode="decimal" placeholder="Monto $ 0" class="input-field text-3xl font-black text-center" oninput="formatInput(this)">
                <select id="g-wallet" class="input-field"></select>
                <select id="g-estado" class="input-field font-bold" onchange="toggleWalletGasto()">
                    <option value="Pagado">Ya lo pagué</option>
                    <option value="Pendiente">Lo quedé debiendo</option>
                </select>
                <input type="text" id="g-nota" placeholder="¿Qué compraste?" class="input-field">
                <button onclick="saveGasto()" class="btn-confirm btn-red">Guardar Gasto</button>
            </div>
        </section>

        <section id="view-pagos" class="view hidden space-y-4">
            <div class="flex gap-2">
                <input type="text" id="p-search" onkeyup="renderPagos()" placeholder="Buscar pago..." class="input-field text-xs">
            </div>
            <div id="pagos-list" class="space-y-2"></div>
        </section>

        <section id="view-deudas" class="view hidden space-y-4">
            <div class="app-card p-5 text-center bg-red-500/5">
                <p class="text-[10px] font-bold text-red-400 uppercase mb-1">Balance de Deudas</p>
                <h2 id="total-deuda" class="text-2xl font-black">$ 0</h2>
            </div>
            <div id="deudas-list" class="space-y-2"></div>
        </section>

        <section id="view-config" class="view hidden space-y-6">
            <div class="app-card p-6 space-y-4">
                <p class="text-[10px] font-black text-slate-500 uppercase">Administrar Maestros</p>
                <div class="space-y-2">
                    <div class="flex gap-2">
                        <input type="text" id="m-new-cat" placeholder="Nueva Categoría" class="input-field">
                        <button onclick="addM('cat')" class="bg-blue-600 px-4 rounded-xl font-bold">+</button>
                    </div>
                    <div class="flex gap-2">
                        <select id="m-cat-sel" class="input-field text-xs"></select>
                        <input type="text" id="m-new-sub" placeholder="Subcategoría" class="input-field">
                        <button onclick="addM('sub')" class="bg-blue-600 px-4 rounded-xl font-bold">+</button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="m-new-wall" placeholder="Nuevo Banco" class="input-field">
                        <button onclick="addM('wall')" class="bg-blue-600 px-4 rounded-xl font-bold">+</button>
                    </div>
                </div>
            </div>
            <div id="config-render" class="space-y-3 pb-20"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#090b0e]/95 backdrop-blur-xl border-t border-[#1f242b] flex justify-around items-center z-50">
        <div onclick="nav('dash')" id="n-dash" class="nav-btn"><i class="fas fa-th-large mb-1"></i><span class="text-[8px] uppercase font-bold">Dash</span></div>
        <div onclick="nav('venta')" id="n-venta" class="nav-btn"><i class="fas fa-plus-circle text-blue-500 mb-1"></i><span class="text-[8px] uppercase font-bold">Venta</span></div>
        <div onclick="nav('gasto')" id="n-gasto" class="nav-btn"><i class="fas fa-minus-circle text-red-500 mb-1"></i><span class="text-[8px] uppercase font-bold">Gasto</span></div>
        <div onclick="nav('pagos')" id="n-pagos" class="nav-btn"><i class="fas fa-receipt mb-1"></i><span class="text-[8px] uppercase font-bold">Pagos</span></div>
        <div onclick="nav('deudas')" id="n-deudas" class="nav-btn"><i class="fas fa-hand-holding-usd mb-1"></i><span class="text-[8px] uppercase font-bold">Deudas</span></div>
        <div onclick="nav('config')" id="n-config" class="nav-btn"><i class="fas fa-sliders-h mb-1"></i><span class="text-[8px] uppercase font-bold">Config</span></div>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('sm_v72')) || { 
            cats: ['Proveedores', 'Impuestos'], 
            subs: { 'Proveedores': ['Varios'], 'Impuestos': ['Luz'] }, 
            walls: ['Efectivo', 'Mercado Pago'], 
            movs: [],
            manualCash: {} 
        };
        let chart = null;

        function nav(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('nav-active'));
            document.getElementById('view-' + v).classList.remove('hidden');
            document.getElementById('n-' + v).classList.add('nav-active');
            
            if(v === 'dash') renderDash();
            if(v === 'pagos') renderPagos();
            if(v === 'deudas') renderDeudas();
            if(v === 'config') renderConfig();
            setupSelectors();
        }

        function formatInput(el) {
            let val = el.value.replace(/\D/g, "");
            el.value = val ? new Intl.NumberFormat('es-AR').format(val) : "";
        }
        function parseM(v) { return parseFloat(v.toString().replace(/\./g, "")) || 0; }
        function formatM(n) { return '$ ' + Math.abs(n).toLocaleString('es-AR'); }

        function toggleWalletGasto() {
            const e = document.getElementById('g-estado').value;
            const w = document.getElementById('g-wallet');
            w.disabled = (e === 'Pendiente');
            w.style.opacity = w.disabled ? '0.2' : '1';
        }

        // --- ACCIONES ---
        function saveVenta() {
            const m = parseM(document.getElementById('v-monto').value);
            if(!m) return;
            db.movs.unshift({ id: Date.now(), fecha: document.getElementById('v-fecha').value, tipo: 'Venta', cat: 'Ventas', subcat: 'Venta Directa', monto: m, wallet: document.getElementById('v-wallet').value, estado: 'Pagado', nota: document.getElementById('v-nota').value });
            save(); alert("¡Venta registrada!"); document.getElementById('v-monto').value = "";
        }

        function saveGasto() {
            const m = parseM(document.getElementById('g-monto').value);
            if(!m) return;
            db.movs.unshift({ id: Date.now(), fecha: document.getElementById('g-fecha').value, tipo: 'Gasto', cat: document.getElementById('g-cat').value, subcat: document.getElementById('g-sub').value, monto: m, wallet: document.getElementById('g-wallet').value, estado: document.getElementById('g-estado').value, nota: document.getElementById('g-nota').value });
            save(); alert("¡Gasto guardado!"); document.getElementById('g-monto').value = "";
        }

        // --- RENDERS ---
        function renderDash() {
            const pagados = db.movs.filter(m => m.estado === 'Pagado');
            let totalGeneral = 0;
            
            const html = db.walls.map(w => {
                const s = pagados.filter(m => m.wallet === w).reduce((a, m) => m.tipo === 'Venta' ? a + m.monto : a - m.monto, 0);
                totalGeneral += s;
                const manual = db.manualCash[w] || 0;
                const diff = manual - s;
                return `
                <div class="app-card p-5 flex flex-col gap-4 border-l-4 ${s >= 0 ? 'border-blue-500' : 'border-red-500'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[9px] font-black text-slate-500 uppercase">${w}</p>
                            <h3 class="text-xl font-black ${s >= 0 ? 'text-white' : 'text-red-400'}">${formatM(s)}</h3>
                        </div>
                        <div class="flex flex-col items-end">
                            <input type="text" placeholder="Efectivo real..." class="cash-input font-bold" 
                                onchange="updateManual('${w}', this.value)" value="${manual ? new Intl.NumberFormat('es-AR').format(manual) : ''}">
                            <p class="text-[8px] font-bold mt-1 ${diff === 0 ? 'text-green-500' : 'text-orange-500'}">
                                ${diff === 0 ? 'CAJA OK' : 'DIF: ' + formatM(diff)}
                            </p>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('wallet-list').innerHTML = html;
            document.getElementById('grand-total').innerText = formatM(totalGeneral);
            
            const vT = pagados.filter(m => m.tipo === 'Venta').reduce((a,b)=>a+b.monto, 0);
            const gT = pagados.filter(m => m.tipo === 'Gasto').reduce((a,b)=>a+b.monto, 0);
            renderChart(vT, gT);
        }

        function updateManual(w, v) {
            db.manualCash[w] = parseM(v);
            save(); renderDash();
        }

        function renderPagos() {
            const s = document.getElementById('p-search').value.toLowerCase();
            const list = db.movs.filter(m => m.estado === 'Pagado' && (m.subcat + m.nota + m.wallet).toLowerCase().includes(s));
            document.getElementById('pagos-list').innerHTML = list.map(m => `
                <div class="app-card p-4 flex justify-between items-center border-l-2 ${m.tipo === 'Venta' ? 'border-blue-500' : 'border-red-500'}">
                    <div>
                        <p class="text-[10px] font-bold uppercase">${m.subcat}</p>
                        <p class="text-[8px] text-slate-500">${m.fecha} • ${m.wallet}</p>
                    </div>
                    <p class="font-black text-xs ${m.tipo === 'Venta' ? 'text-blue-400' : 'text-red-400'}">${m.tipo === 'Venta' ? '+' : '-'}${formatM(m.monto)}</p>
                </div>`).join('');
        }

        function renderDeudas() {
            const saldos = {};
            db.movs.forEach(m => {
                if(m.tipo === 'Gasto') {
                    if(!saldos[m.subcat]) saldos[m.subcat] = 0;
                    m.estado === 'Pendiente' ? saldos[m.subcat] += m.monto : saldos[m.subcat] -= m.monto;
                }
            });
            let total = 0;
            document.getElementById('deudas-list').innerHTML = Object.keys(saldos).map(p => {
                if(saldos[p] <= 0) return '';
                total += saldos[p];
                return `<div class="app-card p-4 flex justify-between items-center"><span class="text-[10px] font-bold uppercase">${p}</span><span class="text-red-400 font-black">DEBO ${formatM(saldos[p])}</span></div>`;
            }).join('') || '<p class="text-center text-[10px] text-slate-500 mt-10">Sin deudas. ¡Caja limpia!</p>';
            document.getElementById('total-deuda').innerText = formatM(total);
        }

        function renderConfig() {
            let h = `<div class="app-card p-5 space-y-4">`;
            db.cats.forEach(c => {
                h += `<div class="border-b border-slate-800/50 pb-2">
                    <div class="flex justify-between items-center text-blue-400 font-black text-[10px] uppercase mb-2">
                        <span>${c}</span>
                        <i onclick="delM('cat','${c}')" class="fas fa-trash-alt text-red-900/50"></i>
                    </div>`;
                (db.subs[c]||[]).forEach(s => {
                    h += `<div class="flex justify-between items-center text-[9px] text-slate-400 pl-4 mb-1">
                        <span>${s}</span>
                        <i onclick="delM('sub','${s}','${c}')" class="fas fa-times"></i>
                    </div>`;
                });
                h += `</div>`;
            });
            h += `<div class="pt-2 text-[10px] text-slate-500 uppercase">Métodos: ${db.walls.map(w => `<span class="bg-slate-800 px-2 py-1 rounded-md mr-1">${w} <i onclick="delM('wall','${w}')" class="fas fa-times text-[7px] ml-1"></i></span>`).join('')}</div></div>`;
            document.getElementById('config-render').innerHTML = h;
            setupSelectors();
        }

        // --- MAESTROS ---
        function addM(type) {
            if(type === 'cat') { const v = document.getElementById('m-new-cat').value; if(v) { db.cats.push(v); db.subs[v] = []; } }
            if(type === 'sub') { const c = document.getElementById('m-cat-sel').value; const v = document.getElementById('m-new-sub').value; if(c && v) db.subs[c].push(v); }
            if(type === 'wall') { const v = document.getElementById('m-new-wall').value; if(v) db.walls.push(v); }
            save(); renderConfig();
        }
        function delM(t, n, p=null) {
            if(!confirm("¿Borrar?")) return;
            if(t === 'cat') { db.cats = db.cats.filter(x => x !== n); delete db.subs[n]; }
            if(t === 'sub') db.subs[p] = db.subs[p].filter(x => x !== n);
            if(t === 'wall') db.walls = db.walls.filter(x => x !== n);
            save(); renderConfig();
        }

        function setupSelectors() {
            const today = new Date().toISOString().split('T')[0];
            if(!document.getElementById('v-fecha').value) document.getElementById('v-fecha').value = today;
            if(!document.getElementById('g-fecha').value) document.getElementById('g-fecha').value = today;
            const wH = db.walls.map(w => `<option value="${w}">${w}</option>`).join('');
            document.getElementById('v-wallet').innerHTML = wH;
            document.getElementById('g-wallet').innerHTML = wH;
            document.getElementById('m-cat-sel').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('g-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            loadSubs();
        }

        function loadSubs() {
            const c = document.getElementById('g-cat').value;
            document.getElementById('g-sub').innerHTML = (db.subs[c]||[]).map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function renderChart(v, g) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: ['Ingresos', 'Egresos'], datasets: [{ data: [v, g], backgroundColor: ['#3b82f6', '#ef4444'], borderRadius: 10 }] },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#484f58', font: { size: 9 } } } }
                }
            });
        }

        function save() { localStorage.setItem('sm_v72', JSON.stringify(db)); }
        function deshacer() { if(confirm("¿Borrar último movimiento?")) { db.movs.shift(); save(); nav('dash'); } }

        window.onload = () => nav('dash');
    </script>
</body>
</html>
